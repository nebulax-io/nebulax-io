<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="50%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#06101a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="text" x1="120" y1="240" x2="280" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="120" cy="160" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="300" cy="280" r="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#glow1)"/>
  <rect width="400" height="400" fill="url(#glow2)"/>

  <!-- Particles -->
  <circle cx="45" cy="30" r="1" fill="#a78bfa" opacity="0.6"/>
  <circle cx="120" cy="55" r="1.2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="310" cy="45" r="0.8" fill="#22d3ee" opacity="0.5"/>
  <circle cx="370" cy="120" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="60" cy="350" r="1.3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="340" cy="340" r="0.9" fill="#a78bfa" opacity="0.5"/>
  <circle cx="80" cy="180" r="0.7" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="320" cy="200" r="1.1" fill="#67e8f9" opacity="0.3"/>
  <circle cx="50" cy="280" r="0.8" fill="#a78bfa" opacity="0.4"/>
  <circle cx="280" cy="370" r="1" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="380" r="0.6" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="380" cy="250" r="1.2" fill="#a78bfa" opacity="0.2"/>
  <circle cx="30" cy="100" r="0.9" fill="#67e8f9" opacity="0.3"/>
  <circle cx="250" cy="30" r="1" fill="#a78bfa" opacity="0.4"/>
  <circle cx="180" cy="360" r="0.7" fill="#22d3ee" opacity="0.5"/>

  <!-- Connection lines -->
  <line x1="45" y1="30" x2="120" y2="55" stroke="#7c3aed" stroke-width="0.3" opacity="0.2"/>
  <line x1="310" y1="45" x2="370" y2="120" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
  <line x1="60" y1="350" x2="340" y2="340" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>
  <line x1="80" y1="180" x2="320" y2="200" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>
  <line x1="50" y1="280" x2="280" y2="370" stroke="#06b6d4" stroke-width="0.3" opacity="0.1"/>

  <!-- Main Symbol -->
  <g transform="translate(200, 155)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="54" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5"/>

    <!-- Brain arc -->
    <path d="M-22,6 A22,22 0 0,1 22,6" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Main node -->
    <circle cx="0" cy="-16" r="7" fill="#ffffff"/>

    <!-- Left node -->
    <circle cx="-18" cy="10" r="3.5" fill="#a78bfa"/>

    <!-- Right node -->
    <circle cx="18" cy="10" r="3.5" fill="#22d3ee"/>

    <!-- Center small node -->
    <circle cx="0" cy="-5" r="2.8" fill="#c4b5fd" opacity="0.7"/>

    <!-- Connection lines -->
    <line x1="0" y1="-16" x2="-18" y2="10" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <line x1="0" y1="-16" x2="18" y2="10" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
    <line x1="0" y1="-5" x2="-18" y2="10" stroke="#c4b5fd" stroke-width="0.7" opacity="0.35"/>
    <line x1="0" y1="-5" x2="18" y2="10" stroke="#67e8f9" stroke-width="0.7" opacity="0.35"/>

    <!-- Bottom bar -->
    <line x1="-15" y1="20" x2="15" y2="20" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="272" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="38" letter-spacing="7" fill="url(#text)">NEBULAX</text>

  <!-- Subtle border -->
  <rect x="1" y="1" width="398" height="398" rx="0" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>
</svg>
