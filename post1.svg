<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="50%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#041520"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="250" y1="200" x2="700" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="glow1" cx="200" cy="300" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1000" cy="400" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.03">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="60" y1="0" x2="60" y2="675"/><line x1="120" y1="0" x2="120" y2="675"/>
    <line x1="180" y1="0" x2="180" y2="675"/><line x1="240" y1="0" x2="240" y2="675"/>
    <line x1="300" y1="0" x2="300" y2="675"/><line x1="360" y1="0" x2="360" y2="675"/>
    <line x1="420" y1="0" x2="420" y2="675"/><line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="540" y1="0" x2="540" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="660" y1="0" x2="660" y2="675"/><line x1="720" y1="0" x2="720" y2="675"/>
    <line x1="780" y1="0" x2="780" y2="675"/><line x1="840" y1="0" x2="840" y2="675"/>
    <line x1="900" y1="0" x2="900" y2="675"/><line x1="960" y1="0" x2="960" y2="675"/>
    <line x1="1020" y1="0" x2="1020" y2="675"/><line x1="1080" y1="0" x2="1080" y2="675"/>
    <line x1="1140" y1="0" x2="1140" y2="675"/>
  </g>

  <!-- Particles -->
  <circle cx="80" cy="50" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="200" cy="100" r="1" fill="#22d3ee" opacity="0.4"/>
  <circle cx="400" cy="60" r="1.2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="600" cy="90" r="0.8" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="800" cy="70" r="1.3" fill="#22d3ee" opacity="0.3"/>
  <circle cx="1000" cy="50" r="1" fill="#a78bfa" opacity="0.4"/>
  <circle cx="1100" cy="100" r="1.1" fill="#67e8f9" opacity="0.35"/>
  <circle cx="100" cy="600" r="1.2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="300" cy="620" r="0.9" fill="#22d3ee" opacity="0.4"/>
  <circle cx="500" cy="590" r="1" fill="#c4b5fd" opacity="0.35"/>
  <circle cx="700" cy="610" r="1.3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="900" cy="600" r="0.8" fill="#67e8f9" opacity="0.45"/>
  <circle cx="1100" cy="620" r="1.1" fill="#22d3ee" opacity="0.35"/>

  <!-- Connection lines -->
  <line x1="80" y1="50" x2="200" y2="100" stroke="#7c3aed" stroke-width="0.4" opacity="0.15"/>
  <line x1="400" y1="60" x2="600" y2="90" stroke="#7c3aed" stroke-width="0.4" opacity="0.12"/>
  <line x1="800" y1="70" x2="1000" y2="50" stroke="#06b6d4" stroke-width="0.4" opacity="0.1"/>
  <line x1="100" y1="600" x2="300" y2="620" stroke="#7c3aed" stroke-width="0.4" opacity="0.12"/>
  <line x1="500" y1="590" x2="700" y2="610" stroke="#06b6d4" stroke-width="0.4" opacity="0.1"/>

  <!-- Logo Symbol -->
  <g transform="translate(150, 300)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.45"/>
    <path d="M-22,6 A22,22 0 0,1 22,6" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="-16" r="7" fill="#ffffff"/>
    <circle cx="-18" cy="10" r="3.5" fill="#a78bfa"/>
    <circle cx="18" cy="10" r="3.5" fill="#22d3ee"/>
    <circle cx="0" cy="-5" r="2.8" fill="#c4b5fd" opacity="0.7"/>
    <line x1="0" y1="-16" x2="-18" y2="10" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <line x1="0" y1="-16" x2="18" y2="10" stroke="#22d3ee" stroke-width="1.2" opacity="0.5"/>
    <line x1="-15" y1="20" x2="15" y2="20" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- NEBULAX text -->
  <text x="250" y="260" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="72" letter-spacing="12" fill="url(#textGrad)">NEBULAX</text>

  <!-- Tagline -->
  <text x="250" y="310" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="22" fill="#9895a7">The Decentralized AI Compute Network</text>

  <!-- Divider line -->
  <line x1="250" y1="335" x2="500" y2="335" stroke="#7c3aed" stroke-width="1" opacity="0.2"/>

  <!-- Key points -->
  <text x="250" y="380" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="18" fill="#e8e6f0">📱  Any Device. Anywhere.</text>
  <text x="250" y="415" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="18" fill="#e8e6f0">💰  Earn While You Sleep.</text>
  <text x="250" y="450" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="18" fill="#e8e6f0">🌍  140+ Countries. 12K+ Nodes.</text>

  <!-- CTA Button -->
  <g transform="translate(250, 490)">
    <rect x="0" y="0" width="280" height="50" rx="10" fill="url(#ctaGrad)"/>
    <text x="140" y="32" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="16" fill="#ffffff">🚀 Join Early Access</text>
  </g>

  <!-- URL -->
  <text x="250" y="570" font-family="'IBM Plex Mono', monospace" font-weight="500" font-size="16" fill="#a78bfa">nebulaxio.netlify.app</text>

  <!-- Token badge -->
  <g transform="translate(850, 550)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
    <text x="60" y="23" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="14" fill="#a78bfa">$NBX</text>
  </g>

  <!-- Stats boxes on right -->
  <g transform="translate(850, 200)">
    <rect x="0" y="0" width="250" height="80" rx="12" fill="#111119" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.15"/>
    <text x="20" y="30" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="28" fill="url(#textGrad)">47K+</text>
    <text x="20" y="52" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="12" fill="#5c596b" letter-spacing="1">WAITLIST MEMBERS</text>
    <text x="20" y="70" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="11" fill="#10b981">● Early Access Open</text>
  </g>

  <g transform="translate(850, 300)">
    <rect x="0" y="0" width="250" height="65" rx="12" fill="#111119" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.15"/>
    <text x="20" y="28" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="22" fill="url(#textGrad)">12,800+</text>
    <text x="20" y="48" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="12" fill="#5c596b" letter-spacing="1">ACTIVE NODES</text>
  </g>

  <g transform="translate(850, 385)">
    <rect x="0" y="0" width="250" height="65" rx="12" fill="#111119" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.15"/>
    <text x="20" y="28" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="22" fill="url(#textGrad)">140+</text>
    <text x="20" y="48" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="12" fill="#5c596b" letter-spacing="1">COUNTRIES</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="673" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.08"/>
</svg>
