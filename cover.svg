<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="50%" stop-color="#06060b"/>
      <stop offset="100%" stop-color="#041520"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="text" x1="200" y1="170" x2="600" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="stats" x1="1100" y1="260" x2="1400" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="200" cy="250" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1300" cy="300" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glow1)"/>
  <rect width="1500" height="500" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="500"/><line x1="60" y1="0" x2="60" y2="500"/>
    <line x1="120" y1="0" x2="120" y2="500"/><line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/><line x1="420" y1="0" x2="420" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/><line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="660" y1="0" x2="660" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/><line x1="780" y1="0" x2="780" y2="500"/>
    <line x1="840" y1="0" x2="840" y2="500"/><line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="960" y1="0" x2="960" y2="500"/><line x1="1020" y1="0" x2="1020" y2="500"/>
    <line x1="1080" y1="0" x2="1080" y2="500"/><line x1="1140" y1="0" x2="1140" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/><line x1="1260" y1="0" x2="1260" y2="500"/>
    <line x1="1320" y1="0" x2="1320" y2="500"/><line x1="1380" y1="0" x2="1380" y2="500"/>
    <line x1="1440" y1="0" x2="1440" y2="500"/><line x1="1500" y1="0" x2="1500" y2="500"/>
    <line x1="0" y1="60" x2="1500" y2="60"/><line x1="0" y1="120" x2="1500" y2="120"/>
    <line x1="0" y1="180" x2="1500" y2="180"/><line x1="0" y1="240" x2="1500" y2="240"/>
    <line x1="0" y1="300" x2="1500" y2="300"/><line x1="0" y1="360" x2="1500" y2="360"/>
    <line x1="0" y1="420" x2="1500" y2="420"/><line x1="0" y1="480" x2="1500" y2="480"/>
  </g>

  <!-- Particles -->
  <circle cx="80" cy="40" r="1.2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="200" cy="80" r="0.8" fill="#22d3ee" opacity="0.4"/>
  <circle cx="350" cy="50" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="500" cy="100" r="1.3" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="650" cy="60" r="0.7" fill="#22d3ee" opacity="0.5"/>
  <circle cx="800" cy="90" r="1.1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="950" cy="45" r="0.9" fill="#67e8f9" opacity="0.4"/>
  <circle cx="1100" cy="70" r="1" fill="#a78bfa" opacity="0.35"/>
  <circle cx="1250" cy="55" r="1.2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="1400" cy="85" r="0.8" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="100" cy="420" r="1" fill="#a78bfa" opacity="0.3"/>
  <circle cx="300" cy="450" r="1.3" fill="#22d3ee" opacity="0.35"/>
  <circle cx="500" cy="400" r="0.9" fill="#a78bfa" opacity="0.4"/>
  <circle cx="700" cy="440" r="1.1" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="900" cy="410" r="0.7" fill="#67e8f9" opacity="0.45"/>
  <circle cx="1100" cy="430" r="1" fill="#a78bfa" opacity="0.35"/>
  <circle cx="1300" cy="460" r="1.2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="150" cy="250" r="0.8" fill="#a78bfa" opacity="0.25"/>
  <circle cx="750" cy="250" r="1" fill="#c4b5fd" opacity="0.2"/>
  <circle cx="1350" cy="250" r="0.9" fill="#22d3ee" opacity="0.25"/>

  <!-- Connection lines -->
  <line x1="80" y1="40" x2="200" y2="80" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
  <line x1="350" y1="50" x2="500" y2="100" stroke="#7c3aed" stroke-width="0.3" opacity="0.12"/>
  <line x1="650" y1="60" x2="800" y2="90" stroke="#06b6d4" stroke-width="0.3" opacity="0.1"/>
  <line x1="1100" y1="70" x2="1250" y2="55" stroke="#7c3aed" stroke-width="0.3" opacity="0.12"/>
  <line x1="100" y1="420" x2="300" y2="450" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>
  <line x1="500" y1="400" x2="700" y2="440" stroke="#06b6d4" stroke-width="0.3" opacity="0.1"/>
  <line x1="900" y1="410" x2="1100" y2="430" stroke="#7c3aed" stroke-width="0.3" opacity="0.1"/>

  <!-- LEFT SIDE: Logo + Brand -->
  <g transform="translate(120, 200)">
    <!-- Logo symbol -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="42" fill="none" stroke="url(#ring)" stroke-width="1.8" opacity="0.5"/>
      <path d="M-18,5 A18,18 0 0,1 18,5" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-13" r="5.5" fill="#ffffff"/>
      <circle cx="-15" cy="8" r="3" fill="#a78bfa"/>
      <circle cx="15" cy="8" r="3" fill="#22d3ee"/>
      <circle cx="0" cy="-4" r="2.2" fill="#c4b5fd" opacity="0.7"/>
      <line x1="0" y1="-13" x2="-15" y2="8" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="-13" x2="15" y2="8" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
      <line x1="-12" y1="16" x2="12" y2="16" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- NEBULAX wordmark -->
  <text x="200" y="210" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="60" letter-spacing="10" fill="url(#text)">NEBULAX</text>

  <!-- Tagline -->
  <text x="200" y="250" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="18" fill="#9895a7">The Decentralized AI Compute Network</text>

  <!-- RIGHT SIDE -->

  <!-- Early Access Pill -->
  <g transform="translate(1080, 148)">
    <rect x="0" y="0" width="220" height="34" rx="17" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="18" cy="17" r="5" fill="#10b981"/>
    <text x="32" y="22" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="14" fill="#a78bfa">Early Access Open</text>
  </g>

  <!-- URL -->
  <text x="1400" y="215" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-weight="500" font-size="20" fill="#a78bfa">nebulaxio.netlify.app</text>

  <!-- Stats -->
  <text x="1400" y="275" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="30" fill="url(#stats)">47K+</text>
  <text x="1400" y="298" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="11" fill="#5c596b" letter-spacing="1">WAITLIST</text>

  <text x="1270" y="275" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="30" fill="url(#stats)">140+</text>
  <text x="1270" y="298" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="11" fill="#5c596b" letter-spacing="1">COUNTRIES</text>

  <text x="1140" y="275" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-weight="600" font-size="30" fill="url(#stats)">12K+</text>
  <text x="1140" y="298" text-anchor="end" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="11" fill="#5c596b" letter-spacing="1">NODES</text>

  <!-- Border -->
  <rect x="1" y="1" width="1498" height="498" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.08"/>
</svg>
