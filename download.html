<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Post Image</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #06060b;
            color: #e8e6f0;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            gap: 24px;
        }
        h1 { font-size: 1.2rem; color: #a78bfa; }
        img {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            border: 1px solid rgba(109,40,217,0.2);
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6d28d9, #0e7490);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:active { transform: scale(0.97); }
        canvas { display: none; }
    </style>
</head>
<body>

<h1>🧠 NEBULAX Post Image</h1>

<img src="post1.svg" id="preview" alt="NEBULAX Post">

<br>

<button class="btn" onclick="download()">⬇️ Download PNG</button>

<canvas id="c"></canvas>

<script>
function download() {
    const img = document.getElementById('preview');
    const canvas = document.getElementById('c');
    canvas.width = 1200;
    canvas.height = 675;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 1200, 675);
    const link = document.createElement('a');
    link.download = 'nebulax-post.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
}
</script>

</body>
</html>
